<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>tear.wtf</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <meta name="title" content="tear.wtf">
        <meta name="description" content="@8ho">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://tear.wtf/">
        <meta property="og:image" content="/assets/images/favicon.png">
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div id="loading-screen">
            <div class="loader"></div>
        </div>

        <canvas id="Background"></canvas>

        <div class="container">
            <div class="card">
                <div class="card-inner">
                    <div class="card-inner-profile">
                        <img src="/assets/images/pfp.png" height="50px">
                        <div class="card-inner-profile-text">
                            <h3>Tear</h3>
                            <h4 id="tear-discord" onclick="discordbutton('tear')">@8ho</h4>
                            <h5 id="status-text">If u see this something failed to load ＞﹏＜</h5>
                        </div>
                    </div>


                    <div class="dropdown-container">
                        <div class="tab-selector" onclick="toggleDropdown()">
                            <h4 id="tabname">Select Category</h4>
                            <span class="arrow" id="arrow"  style="color: #4c4c4c;">▼</span>
                        </div>
                        
                        <ul class="dropdown-menu" id="dropdownMenu">
                            <li onclick="selectTab('Home')"><h4>Home</h4></li>
                            <li onclick="selectTab('Roblox')"><h4>Roblox</h4></li>
                            <li onclick="selectTab('Socials')"><h4>Socials</h4></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div id="content-roblox" class="card tab-content">
                <div class="content-inner-roblox">
                    <img src="/assets/images/roblox_pfp.png" height="80px">
                    
                    <div class="content-inner-roblox-text">
                        <h4 class="display-name">@vvv</h4>
                        <h4 class="username">vvv</h4>
                        
                        <div class="roblox-stats">
                            <div class="stat-box">
                                <h5>Friends: --</h5>
                            </div>
                            <div class="stat-box">
                                <h5>Followers: --</h5>
                            </div>
                            <div class="stat-box">
                                <h5>Following: --</h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="content-socials" class="card tab-content">
                <div class="card-inner-socials">
                    <h4 class="socials-header">Connect with me</h4>
                    
                    <div class="socials-grid">
                        <a href="https://www.t.me/prominority" class="social-item">
                            <div class="social-info">
                                <span class="platform">Telegram</span>
                                <span class="username">@prominority</span>
                            </div>
                            <span class="arrow-icon">→</span>
                        </a>

                        <a href="https://www.instagram.com/loooooooooserrrrr/" class="social-item">
                            <div class="social-info">
                                <span class="platform">Instagram</span>
                                <span class="username">@loooooooooserrrrr</span>
                            </div>
                            <span class="arrow-icon">→</span>
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="spotify-card">
                <div class="spotify-card-inner">
                <img id="track-art" src="" height="75px">
                    <div class="spotify-card-inner-text">    
                        <h4 id="spotify-header"> now playing <img src="/assets/images/nowplaying.gif" height="14" style="border: none; border-radius: 0; vertical-align:middle; margin-left:-3px; transition: none; box-shadow: none;"> </h4>                   
                        <h5 id="track-name"></h5>
                        <h4 id="track-artist"></h4>
                    </div>
                </div>
            </div>
        </div>

        <!--Effects-->
        <script src="js/effects/background_effects.js" async defer></script>

        <!--Handlers-->
        <script src="js/handlers/utils.js" async defer></script>
        <script src="js/handlers/fetch_roblox.js" async defer></script>
        <script src="js/handlers/lastfm_handler.js" async defer></script>
        <script src="js/handlers/tab_handler.js" async defer></script>

    </body>
</html>
